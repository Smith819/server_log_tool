[server]
# OCR backend only needs a minimal server section for manifest/log settings consumed by ocr_sync_service.py.
manifest_name = manifest.json
log_dir = /opt/autoglm-ocr-backend/logs

[api]
# OCR backend control/status API.
enabled = true
listen_host = 0.0.0.0
port = 39384
public_base_url =
auth_token =
status_limit = 50

[ocr_sync]
# Set enabled = true on the OCR server to poll the frontend manifest and upload results.
enabled = true
# Public base URL of the frontend file server, for example https://front.example.com:39283
frontend_base_url = http://127.0.0.1:39283
# Poll interval for frontend manifest checks.
poll_interval_seconds = 30
# HTTP request timeout for manifest / file downloads.
request_timeout_seconds = 120
# false allows self-signed frontend TLS certificates.
verify_ssl = true
# OCR work directories and state cache.
work_dir = /opt/autoglm-ocr-backend/ocr_sync_work
runtime_cache_dir = /opt/autoglm-ocr-backend/runtime_cache
state_file = /opt/autoglm-ocr-backend/runtime_cache/ocr_sync_state.json
# Local OCR project checkout and Python executable.
ocr_project_dir = /path/to/ocr_ai
ocr_python_executable = python3
# Optional OCR pipeline credentials.
amap_api_key =
siliconflow_api_key =
siliconflow_model = LoRA/Qwen/Qwen2.5-32B-Instruct
# OCR behavior.
skip_llm = false
save_slices = false

[upload]
# Enable upload-back to the original file host on the OCR server.
enabled = false
# false allows self-signed upload targets.
verify_ssl = true
# Cloudreve credentials and target directory.
cloudreve_username =
cloudreve_password =
cloudreve_upload_path = my
cloudreve_purchase_ticket =
# Caihong upload options.
caihong_cookie =
caihong_show = 1
caihong_ispwd = 0
caihong_pwd =

[tls]
# Shared certificate used by the backend HTTPS API and optional outbound client auth.
enabled = false
cert_file = /opt/autoglm-ocr-backend/certs/server.crt
key_file = /opt/autoglm-ocr-backend/certs/server.key
min_tls_version = TLSv1.2
