[server]
# Port for Method 1 (form/text/json POST) — HTTP or HTTPS depending on [tls]
post_port = 39282
# Port for Method 2 (multipart upload) — HTTP or HTTPS depending on [tls]
multipart_port = 39283
# Directory to save downloaded images and log files
upload_dir = /opt/autoglm-frontend/uploads
# Directory for server logs
log_dir = /opt/autoglm-frontend/logs
# Public base URL used in manifest URLs. Leave empty to infer from request.
public_base_url =
# Manifest filename exposed by GET /manifest.json
manifest_name = manifest.json
# Download behavior
download_timeout = 30
max_image_size = 52428800

[tls]
# Set enabled = true to serve HTTPS instead of HTTP.
enabled = false
# Path to PEM-encoded certificate file (chain OK)
cert_file = /opt/autoglm-frontend/certs/server.crt
# Path to PEM-encoded private key file
key_file = /opt/autoglm-frontend/certs/server.key
# Minimum TLS version: TLSv1.2 or TLSv1.3
min_tls_version = TLSv1.2

[backend]
# Optional OCR backend pairing. When enabled, frontend notifies the backend
# to run a sync cycle as soon as a new image/log is ready.
enabled = false
base_url =
notify_url =
request_timeout_seconds = 10
verify_ssl = true
auth_token =
