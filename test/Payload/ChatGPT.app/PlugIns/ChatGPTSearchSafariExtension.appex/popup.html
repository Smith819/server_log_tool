<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <style>
        body {
            font-family: system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            min-width: 300px;
            min-height: 100vh;
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            color-scheme: light dark;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .container {
            background: white;
            padding: 0px;
            max-width: 500px;
            text-align: center;
        }
        h1 {
            font-size: 22px;
            font-weight: 500;
            margin-bottom: 15px;
            color: #0D0D0D;
        }
        p {
            font-size: 16px;
            line-height: 1.6;
            color: #5D5D5D;
        }
        img.icon {
            text-align: center;
            width: 60px;
            height: 60px;
        }
        a {
            color: #0285FF;
            text-decoration: none;
            font-weight: 500;
        }
        a:hover {
            text-decoration: underline;
        }
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #1e1e1e;
            }
            .container {
                background: #1e1e1e;
            }
            h1 {
                color: white;
            }
            p {
                color: #CCCCCC;
            }
            img.icon {
                filter: invert(1);
            }
            a {
                color: #66B2FF;
            }
        }
    </style>
    <script src="localize.js" defer></script>
</head>
<body>
    <div class="container">
        <img class="icon" src="images/icon-256.png" alt="OpenAI">

        <h1 id="header">ChatGPT search</h1>
        <p>
            <span id="description">Turning on this extension will direct queries you type into the Safari search bar to ChatGPT search, making ChatGPT search your default search engine in Safari. The same policies that govern your use of ChatGPT apply.</span>
        </p>
        <p>
            <a id="learn_more" href="https://help.openai.com/articles/9237897-chatgpt-search" target="_blank">Learn more</a>
        </p>
    </div>
</body>
</html>
